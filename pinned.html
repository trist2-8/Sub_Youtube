<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinned Subtitle</title>
    <link rel="stylesheet" href="pinned.css" />
  </head>
  <body>
    <main class="pin-shell">
      <header class="pin-header">
        <div class="pin-brand">
          <div class="pin-logo">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 7.5a2.5 2.5 0 0 1 2.5-2.5h13A2.5 2.5 0 0 1 21 7.5v9A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5z" />
              <path d="m10 9.5 5 2.5-5 2.5z" />
            </svg>
          </div>
          <div>
            <h1>Subtitle Pin</h1>
            <p id="pinTitle">Đang kết nối với tab video…</p>
          </div>
        </div>
        <button id="refreshPinnedBtn" class="icon-btn" type="button" title="Làm mới">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-2.64-6.36" />
            <path d="M21 3v6h-6" />
          </svg>
        </button>
      </header>

      <section class="pin-meta">
        <span id="pinPlatformChip" class="meta-chip">Ready</span>
        <span id="pinStatusChip" class="meta-chip">Waiting</span>
        <span id="pinTimeChip" class="meta-chip">00:00:00,000</span>
      </section>

      <section class="pin-grid">
        <article class="pin-card">
          <div class="pin-label-wrap">
            <span class="pin-kicker">Source</span>
            <strong id="pinSourceLabel">Original</strong>
          </div>
          <div id="pinSourceText" class="pin-text">Waiting for subtitle…</div>
        </article>

        <article class="pin-card">
          <div class="pin-label-wrap">
            <span class="pin-kicker">Output</span>
            <strong id="pinOutputLabel">Translation</strong>
          </div>
          <div id="pinOutputText" class="pin-text dim">Chưa có dữ liệu dịch hoặc song ngữ.</div>
        </article>
      </section>

      <footer class="pin-footer">
        <span id="pinFooterNote">Cửa sổ ghim độc lập với popup chính để không làm ảnh hưởng luồng đọc phụ đề.</span>
      </footer>
    </main>
    <script src="pinned.js"></script>
  </body>
</html>
